<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

    <!-- PWA / Add to Home Screen -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SnapVault" />
    <meta name="application-name" content="SnapVault" />
    <meta name="theme-color" content="#3B82F6" />

    <!-- SEO / Share -->
    <meta name="description" content="SnapVault — Back up your iPhone photos and videos to the cloud. Free your storage instantly." />
    <meta property="og:title" content="SnapVault" />
    <meta property="og:description" content="Back up your iPhone photos and free your storage instantly." />
    <meta property="og:type" content="website" />

    <!-- Icons (placeholder — replace with real icon later) -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>SnapVault</title>

    <style>
      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #CBD5E1;
      }
      * { -webkit-tap-highlight-color: transparent; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run SnapVault.</noscript>
    <div id="root"></div>
  </body>
</html>
